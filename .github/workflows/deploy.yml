name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Setup KV namespace
        run: node scripts/setup-kv.js
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          secrets: |
            APP_PASSWORD
            CF_API_TOKEN
            CF_API_TOKEN1
            CF_API_TOKEN2
            DNSPOD_SECRET_ID
            DNSPOD_SECRET_KEY
            KOMARI_BASE_URL
            KOMARI_API_TOKEN
            ROTATION_API_KEY
        env:
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_API_TOKEN1: ${{ secrets.CF_API_TOKEN1 }}
          CF_API_TOKEN2: ${{ secrets.CF_API_TOKEN2 }}
          DNSPOD_SECRET_ID: ${{ secrets.DNSPOD_SECRET_ID }}
          DNSPOD_SECRET_KEY: ${{ secrets.DNSPOD_SECRET_KEY }}
          KOMARI_BASE_URL: ${{ secrets.KOMARI_BASE_URL }}
          KOMARI_API_TOKEN: ${{ secrets.KOMARI_API_TOKEN }}
          ROTATION_API_KEY: ${{ secrets.ROTATION_API_KEY }}
