name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'viogus' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Check secrets
        id: check
        run: |
          if [ -z "${{ secrets.CF_API_TOKEN }}" ]; then
            echo "::warning::CF_API_TOKEN secret not set — skipping deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup KV namespace
        if: steps.check.outputs.skip != 'true'
        run: node scripts/setup-kv.js
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy
        if: steps.check.outputs.skip != 'true'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Upload optional secrets
        if: steps.check.outputs.skip != 'true'
        run: node scripts/setup-secrets.js
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          CF_API_TOKEN1: ${{ secrets.CF_API_TOKEN1 }}
          CF_API_TOKEN2: ${{ secrets.CF_API_TOKEN2 }}
          DNSPOD_SECRET_ID: ${{ secrets.DNSPOD_SECRET_ID }}
          DNSPOD_SECRET_KEY: ${{ secrets.DNSPOD_SECRET_KEY }}
          KOMARI_BASE_URL: ${{ secrets.KOMARI_BASE_URL }}
          KOMARI_API_TOKEN: ${{ secrets.KOMARI_API_TOKEN }}
          ROTATION_API_KEY: ${{ secrets.ROTATION_API_KEY }}
